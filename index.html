<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>1eak.cool</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💠</text></svg>">
  <link rel="stylesheet" href="style.css?v=8.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
</head>
<body>

<div id="toast-container"></div>

<div id="loading-mask" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#0f172a;z-index:99999;display:flex;justify-content:center;align-items:center;flex-direction:column;">
  <div class="loading-spinner"></div>
  <div style="color:#94a3b8;margin-top:14px;font-size:0.9rem;font-family:-apple-system,BlinkMacSystemFont,sans-serif;">加载中...</div>
</div>

<!-- 顶部导航 -->
<header class="topnav" id="topnav">
  <div class="topnav-left">
    <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileNav()">☰</button>
    <span class="logo">1EAK<span class="dot">.</span>COOL</span>
    <nav class="nav-links" id="navLinks">
      <a href="#home" class="nav-link active" id="navHome">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        首页
      </a>
      <a href="#write" class="nav-link" id="navWrite">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        发帖
      </a>
      <a href="#profile" class="nav-link" id="navMyProfile" onclick="if(currentUser) this.href='#profile?u='+currentUser.username">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        我的
      </a>
      <a href="#settings" class="nav-link" id="navSettings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        设置
      </a>
      <a href="#about" class="nav-link" id="navAbout">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        关于
      </a>
    </nav>
  </div>

  <div class="topnav-right">
    <!-- 主题切换 -->
    <div class="theme-toggle" id="themeToggle">
      <button onclick="setTheme('light')" id="themeLight" title="日间">☀️</button>
      <button onclick="setTheme('dark')" id="themeDark" class="active" title="夜间">🌙</button>
      <button onclick="setTheme('auto')" id="themeAuto" title="跟随系统">🖥</button>
    </div>

    <!-- 用户 -->
    <div class="user-pill" id="userPill" onclick="if(currentUser)window.location.hash='#profile?u='+currentUser.username">
      <div class="avatar-sm" id="navAvatar" style="background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:0.7rem;">?</div>
      <span id="navUsername">未登录</span>
    </div>
  </div>
</header>

<!-- 主内容区 -->
<main class="main-content">
  <!-- 首页 -->
  <div id="view-home" class="view-section">
    <div class="page-header">
      <h1>帖子</h1>
      <div class="layout-toggle">
        <button id="layoutList" onclick="setLayout('list')" class="active">☰ 列表</button>
        <button id="layoutGrid" onclick="setLayout('grid')">▦ 网格</button>
      </div>
    </div>
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="搜索..." onkeydown="if(event.key==='Enter')searchPosts()">
      <select id="sortSelect" onchange="searchPosts()">
        <option value="latest">最新</option>
        <option value="hot">热度</option>
        <option value="comments">热议</option>
      </select>
      <button class="btn btn-primary" onclick="searchPosts()">搜索</button>
    </div>
    <div id="posts-list" class="posts-list"></div>
    <button id="loadMoreBtn" class="load-more" onclick="loadPosts(false)" style="display:none;">加载更多</button>
  </div>

  <!-- 帖子详情 -->
  <div id="view-post" class="view-section" style="display:none;">
    <button onclick="window.location.hash='#home'" class="back-btn">← 返回</button>
    <article id="single-post-content" class="full-article"></article>
    <div class="comments-section">
      <h3>评论</h3>
      <div class="comment-input-box">
        <textarea id="commentInput" placeholder="写评论... (Markdown 和图片)"></textarea>
        <div class="comment-input-row">
          <div style="display:flex;align-items:center;gap:8px;">
            <input type="file" id="commentImgUpload" accept="image/*,video/*" style="display:none;" onchange="uploadCommentImage()">
            <button class="btn btn-sm btn-ghost" onclick="document.getElementById('commentImgUpload').click()">📷 图片</button>
            <button class="btn btn-sm btn-ghost" id="cancelReplyBtn" style="display:none;" onclick="cancelReply()">取消回复</button>
            <span id="commentUploadStatus" style="font-size:0.78rem;color:var(--text-muted);"></span>
          </div>
          <button class="btn btn-primary" onclick="submitComment()">发送</button>
        </div>
      </div>
      <div id="commentsList" class="comments-list"></div>
    </div>
  </div>

  <!-- 发帖 -->
  <div id="view-write" class="view-section" style="display:none;">
    <div class="write-view">
      <h2>写帖子</h2>
      <form id="postForm" onsubmit="submitPost(event)">
        <div class="form-group">
          <label>分类</label>
          <select id="postCategory" class="form-control" style="max-width:180px;">
            <option value="灌水">🌊 灌水</option>
            <option value="技术">💻 技术</option>
            <option value="生活">☕ 生活</option>
            <option value="提问">❓ 提问</option>
          </select>
        </div>
        <div class="form-group">
          <label>标题</label>
          <input type="text" id="postTitle" class="form-control" placeholder="标题">
        </div>
        <div class="form-group">
          <label>内容 <span style="font-weight:400;color:var(--text-muted);">(Markdown)</span></label>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <input type="file" id="imageUploadInput" accept="image/*,video/*" multiple style="display:none;" onchange="uploadImage()">
            <button type="button" class="btn btn-sm btn-ghost" onclick="document.getElementById('imageUploadInput').click()">📷 插入图片</button>
            <span id="uploadStatus" style="font-size:0.78rem;color:var(--text-muted);"></span>
          </div>
          <textarea id="postContent" class="form-control" placeholder="内容..." style="min-height:220px;"></textarea>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
          <button type="submit" class="btn btn-primary">发布</button>
          <button type="button" id="cancelEditPostBtn" class="btn btn-ghost" style="display:none;" onclick="cancelEditPost()">取消编辑</button>
          <span id="draftStatus" style="font-size:0.8rem;color:var(--text-muted);"></span>
        </div>
      </form>
    </div>
  </div>

  <!-- 个人主页 -->
  <div id="view-profile" class="view-section" style="display:none;">
    <button onclick="window.history.back()" class="back-btn">← 返回</button>
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar" style="display:flex;align-items:center;justify-content:center;font-size:2rem;">?</div>
      <h2 class="profile-name" id="profileName">...</h2>
      <div class="profile-bio" id="profileBio"></div>
      <div class="profile-stats">
        <div class="stat-item"><div class="stat-num" id="statPosts">0</div><div class="stat-label">帖子</div></div>
        <div class="stat-item"><div class="stat-num" id="statFollowers">0</div><div class="stat-label">粉丝</div></div>
        <div class="stat-item"><div class="stat-num" id="statFollowing">0</div><div class="stat-label">关注</div></div>
      </div>
    </div>
    <div id="profilePosts"></div>
  </div>

  <!-- 设置 -->
  <div id="view-settings" class="view-section" style="display:none;">
    <h2 style="margin-bottom:20px;">个人设置</h2>
    <div class="settings-section">
      <h3>修改昵称</h3>
      <div style="display:flex;gap:10px;">
        <input type="text" id="settingsNickname" class="form-control" placeholder="新昵称 (限12字)" maxlength="12" style="max-width:280px;">
        <button class="btn btn-primary" onclick="updateNickname()">保存</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>个性签名</h3>
      <div style="display:flex;gap:10px;">
        <input type="text" id="settingsBio" class="form-control" placeholder="个性签名 (限50字)" maxlength="50" style="max-width:360px;">
        <button class="btn btn-primary" onclick="updateBio()">保存</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>恢复短语</h3>
      <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:10px;">忘记密码时用此短语重置。请妥善保存。</p>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <code id="settingsRecoveryPhrase" style="background:var(--bg);padding:8px 14px;border-radius:6px;font-size:1rem;font-family:var(--font-mono);letter-spacing:2px;border:1px solid var(--border);">加载中...</code>
        <button class="btn btn-sm btn-ghost" onclick="copyRecoveryPhrase()">复制</button>
      </div>
      <button class="btn btn-sm btn-danger" onclick="regenerateRecoveryPhrase()">重新生成</button>
    </div>

    <div class="settings-section">
      <h3>退出登录</h3>
      <button class="btn btn-danger" onclick="doLogout()">退出登录</button>
    </div>
  </div>

  <!-- 关于 -->
  <div id="view-about" class="view-section" style="display:none;">
    <h2 style="margin-bottom:20px;">关于本站</h2>
    <div class="about-section">
      <h3>技术</h3>
      <p>基于 Cloudflare Pages + D1 + R2 构建的无服务器论坛。纯静态前端 + Edge Functions 后端，Markdown 发帖，图片视频上传。</p>
    </div>
    <div class="about-section">
      <h3>联系</h3>
      <p>这是一个私人小站，仅供自己和好友使用。</p>
    </div>
  </div>
</main>

<script src="script.js?v=8.0"></script>
</body>
</html>
