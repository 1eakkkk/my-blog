name: Release check

on:
  push:
  pull_request:

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node --check script.js
      - run: node --check functions/api/comments.js
      - run: node --test tools/check-release.test.mjs
      - run: node tools/check-release.mjs
